name: Build and Test Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        docker build -t gin-ping-app:latest .

    - name: Run container
      run: |
        docker run -d -p 8080:8080 --name gin-ping-app gin-ping-app:latest
        sleep 5

    # Testing GET /ping endpoint
    - name: Test /ping endpoint
      run: |
        curl --fail http://localhost:8080/ping

    # Testing POST /greet endpoint
    - name: Test /greet endpoint
      run: |
        curl --fail -X POST http://localhost:8080/greet \
        -H "Content-Type: application/json" \
        -d '{"name": "GitHub Actions"}'

    # Validate response content
    - name: Validate response contains greetings
      run: |
        response=$(curl --fail -X POST http://localhost:8080/greet \
          -H "Content-Type: application/json" \
          -d '{"name": "GitHub Actions"}')

        echo "$response" | grep -E "Good (Morning|Afternoon|Evening|Night), GitHub Actions!"

    # =========================
    # 🔒 TRIVY SECURITY SCAN
    # =========================
    - name: Install Trivy
      run: |
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh
        sudo mv trivy /usr/local/bin/

    - name: Run Trivy scan (fail on HIGH/CRITICAL)
      run: |
        trivy image \
          --severity HIGH,CRITICAL \
          --exit-code 1 \
          gin-ping-app:latest

    # Cleanup
    - name: Stop container
      if: always()
      run: |
        docker stop gin-ping-app || true
        docker rm gin-ping-app || true
        docker rmi gin-ping-app:latest || true