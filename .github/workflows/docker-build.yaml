name: Build and Test Docker Image

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Install jq
      run: sudo apt-get update && sudo apt-get install -y jq

    # 🔑 IMPORTANT: --load makes image visible to Trivy
    - name: Build Docker image
      run: |
        docker buildx build \
          --load \
          -t gin-ping-app:latest .

    - name: Run container
      run: |
        docker run -d -p 8080:8080 --name gin-ping-app gin-ping-app:latest
        sleep 5

    - name: Test /ping endpoint
      run: |
        curl --fail http://localhost:8080/ping

    - name: Validate /greet response
      run: |
        response=$(curl -s -X POST http://localhost:8080/greet \
          -H "Content-Type: application/json" \
          -d '{"name":"GitHub Actions"}')

        echo "Response: $response"
        message=$(echo "$response" | jq -r '.message')
        echo "$message" | grep -E "Good (Morning|Afternoon|Evening|Night), GitHub Actions"

    # =========================
    # TRIVY (FIXED)
    # =========================

    - name: Install Trivy
      run: |
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh
        sudo mv trivy /usr/local/bin/

    - name: Verify image exists
      run: docker images

    - name: Run Trivy scan
      run: |
        trivy image \
          --severity HIGH,CRITICAL \
          --exit-code 1 \
          --no-progress \
          gin-ping-app:latest

    # =========================
    # CLEANUP
    # =========================

    - name: Cleanup
      if: always()
      run: |
        docker stop gin-ping-app || true
        docker rm gin-ping-app || true
        docker rmi gin-ping-app:latest || true